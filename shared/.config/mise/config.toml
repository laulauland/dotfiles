[settings]
# Token lives in the macOS keychain, so mise's default gh_cli_tokens
# (reads ~/.config/gh/hosts.yml) finds nothing. Fall back to `git credential
# fill`, which git routes to `gh auth git-credential` -> keychain.
github.use_git_credentials = true

[tools]
bun = "latest"
elixir = "latest"
erlang = "latest"
go = "latest"
node = "latest"
pnpm = "latest"
rust = "latest"
zig = "latest"

"github:earendil-works/pi" = "latest"
herdr = "latest"
neovim = "latest"
hunk = "latest"                                  # aqua:modem-dev/hunk — review-first diff viewer
"github:kitlangton/ghui" = "latest"                # GitHub PR TUI ("open in editor" -> nvim)
hyperfine = "latest"
