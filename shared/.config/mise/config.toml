[bootstrap.macos.dock]
autohide = true
orientation = "left"
magnification = true
largesize = 85
tilesize = 34
show_recents = false
mru_spaces = false

[bootstrap.macos.finder]
show_pathbar = true
show_status_bar = false
preferred_view_style = "column"

[bootstrap.macos.keyboard]
