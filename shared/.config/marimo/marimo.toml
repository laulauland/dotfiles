[snippets]
include_default_snippets = true
custom_paths = []

[runtime]
default_csv_encoding = "utf-8"
auto_instantiate = false
watcher_on_save = "lazy"
std_stream_max_bytes = 1000000
reactive_tests = true
on_cell_change = "autorun"
output_max_bytes = 8000000
show_tracebacks = false
default_sql_output = "auto"
auto_reload = "lazy"

[diagnostics]
enabled = true
sql_linter = true

[language_servers.pylsp]
enable_pyflakes = false
enable_mypy = true
enable_pydocstyle = false
enable_ruff = true
enable_pylint = false
enabled = false
enable_flake8 = false

[language_servers.ty]
enabled = true

[experimental]
external_agents = true
chat_modes = true

[save]
autosave_delay = 1000
autosave = "after_delay"
format_on_save = false

[completion]
signature_hint_on_typing = true
copilot = false
activate_on_typing = true

[server]
follow_symlink = false
browser = "default"

[formatting]
line_length = 79

[package_management]
manager = "uv"

[mcp]
presets = []

[mcp.mcpServers]

[ai.custom_providers]

[ai.models]
custom_models = []
displayed_models = []

[keymap]
preset = "default"

[keymap.overrides]

[display]
reference_highlighting = true
default_table_page_size = 10
dataframes = "rich"
theme = "light"
default_width = "columns"
cell_output = "below"
code_editor_font_size = 14
default_table_max_columns = 50
