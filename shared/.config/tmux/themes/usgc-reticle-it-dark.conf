# USGC-RETICLE-IT dark theme for tmux
# Palette adapted from the USGC-RETICLE-IT terminal theme.

set -g status-style "bg=#262626,fg=#459a65"
set -g status-left-style "fg=#f6c443,bold"
set -g window-status-current-style "fg=#000000,bg=#f6c443,bold"
set -g pane-border-style "fg=#262626"
set -g pane-active-border-style "fg=#f6c443"
set -g message-style "bg=#f6c443,fg=#000000"
set -g mode-style "bg=#01057c,fg=#f6c443"
