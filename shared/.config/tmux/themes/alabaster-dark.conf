# Alabaster dark theme for tmux
# Palette adapted from p00f's Alabaster Dark terminal theme.

set -g status-style "bg=#333333,fg=#cecece"
set -g status-left-style "fg=#217ebc,bold"
set -g window-status-current-style "fg=#ffffff,bg=#217ebc,bold"
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#217ebc"
set -g message-style "bg=#217ebc,fg=#ffffff"
set -g mode-style "bg=#293334,fg=#cecece"
