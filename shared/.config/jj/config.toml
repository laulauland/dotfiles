"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Laurynas Keturakis"
email = "laurynas.keturakis@gmail.com"

[ui]
default-command = "overview"
editor = "nvim"
#pager = "delta"
diff-formatter = "difft"
merge-editor = "mergiraf"

[merge-tools.difft]
program = "difft"
diff-args = [
	"--display",
	"side-by-side",
	"--color",
	"always",
	"$left",
	"$right",
]

[merge-tools.jj-hunk]
program = "jj-hunk"
edit-args = ["select", "$left", "$right"]

[aliases]
overview = [
	"util",
	"exec",
	"--",
	"sh",
	"-c",
	"jj diff --stat && jj log --limit 3",
]
l = ["log", "-r", "all()", "--color=always", "-n", "15"]
n = ["new"]
pull = ["git", "fetch"]
push = [
	"util",
	"exec",
	"--",
	"sh",
	"-c",
	"""
# Prefer pushing the closest bookmark (e.g. main) if it exists
bookmark=$(jj log -r 'closest_bookmark(@)' -T 'bookmarks' --no-graph 2>/dev/null | head -1 | cut -d ' ' -f 1)
if [ -n "$bookmark" ]; then
  jj git push -b "$bookmark"
  exit $?
fi

# Fallback: use closest_pushable to find the right commit (skips empty/no-description)
target=$(jj log -r 'closest_pushable(@)' -T 'change_id' --no-graph 2>/dev/null | head -1)
if [ -n "$target" ]; then
  jj git push -c "$target"
else
  echo "No pushable commit found (need non-empty commit with description)"
  exit 1
fi
""",
]
pushall = [
	"util",
	"exec",
	"--",
	"sh",
	"-c",
	"jj git remote list | awk '{print $1}' | xargs -I {} sh -c 'echo Pushing to {}... && jj git push --remote {}'",
]
pr = [
	"util",
	"exec",
	"--",
	"bash",
	"-c",
	"""
gh pr create --head $(jj log -r 'closest_bookmark(@)' -T 'bookmarks' --no-graph | cut -d ' ' -f 1)
""",
]
sync = ["git", "fetch", "--all-remotes"]
stack = ["log", "-r", "stack()"]
c = ["commit"]
ci = ["commit", "--interactive"]
e = ["edit"]
s = ["status"]
parents = ["log", "-r", "parents(@)"]
merge = [
	"util",
	"exec",
	"--",
	"sh",
	"-c",
	"jj new @ \"$1\" -m \"Merge $1\"",
	"",
]
gi = ["git", "init"]
z = ["fuzzy_bookmark"]
za = ["bookmark", "list", "-a"]

# Catches common git-isms / typos from agents
cat = ["file", "show"]
untrack = ["file", "untrack"]
remotes = ["git", "remote"]

# Megamerge workflow — see https://isaaccorbrey.com/notes/jujutsu-megamerges-for-fun-and-profit
# Build an octopus merge from N bookmarks, then sit on an empty WIP child:
#   jj mega feat-a feat-b feat-c
mega = [
	"util",
	"exec",
	"--",
	"sh",
	"-c",
	"jj new \"$@\" -m megamerge && jj new",
	"",
]
# Insert a revision between trunk() and the nearest megamerge (becomes a new merge parent).
insert = [
	"rebase",
	"--after",
	"trunk()",
	"--before",
	"closest_merge(@)",
	"--revision",
]
# Move every non-empty commit above the megamerge into the megamerge as new parents.
stage = ["insert", "closest_merge(@)+:: ~ empty()"]
# Rebase mutable roots onto trunk(), preserving remote-tracked branches.
restack = [
	"rebase",
	"--onto",
	"trunk()",
	"--source",
	"roots(trunk()..) & mutable()",
	"--simplify-parents",
]

fuzzy_bookmark = [
	"util",
	"exec",
	"--",
	"sh",
	"-c",
	"""
if [ "x$1" = "x" ]; then
  jj bookmark list
else
  jj bookmark list -a -T 'separate("@", name, remote) ++ "\n"' 2> /dev/null | sort | uniq | fzf -f "$1" | head -n1 | xargs jj new
fi
""",
	"",
]

[remotes.origin]
auto-track-bookmarks = "glob:*"

# [fsmonitor]
# # Use Watchman for faster working copy snapshots in large repos
# # Requires: brew install watchman
# backend = "watchman"

[snapshot]
auto-update-stale = true

[git]
write-change-id-header = true
sign-on-push = true
abandon-unreachable-commits = true
track-default-bookmark-on-clone = true
private-commits = "description(glob:'wip:*') | description(glob:'private:*') | description(exact:'megamerge')"

[revsets]
# `jj bookmark advance` (alias `jj b a`) targets this; matches old `tug` behavior.
bookmark-advance-to = "closest_pushable(@)"

[revset-aliases]
"closest_bookmark(to)" = "heads(::to & bookmarks())"
"closest_merge(to)" = "heads(::to & merges())"
"fork_history(to, from)" = "fork_point(to | from)..@"
"immutable_heads()" = "builtin_immutable_heads() | remote_bookmarks()"
"closest_pushable(to)" = 'heads(::to & mutable() & ~description(exact:"") & (~empty() | merges()))'
# stack(x, n) is the set of mutable commits reachable from 'x', with 'n'
# parents. 'n' is often useful to customize the display and return set for
# certain operations. 'x' can be used to target the set of 'roots' to traverse,
# e.g. @ is the current stack.
"stack()" = 'ancestors(reachable(@, mutable()))'
"stack(x)" = 'ancestors(reachable(x, mutable()))'
"stack(x, n)" = 'ancestors(reachable(x, mutable()), n)'

[template-aliases]
"format_timestamp(timestamp)" = "timestamp.ago()"
'format_short_change_id(id)' = 'id.shortest()'

