# Based on AeroSpace's current i3-like reference configuration:
# https://nikitabobko.github.io/AeroSpace/goodies#i3-like-config
config-version = 2

# Keep AeroSpace running after login and reload this managed file when it changes.
start-at-login = true
auto-reload-config = true

# i3-style workspaces disappear when empty.
persistent-workspaces = []

# Preserve the i3-like reference layout behavior. AeroSpace's normalizations are
# useful in the default configuration, but unlike i3 they can reshape the tree.
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# Keep pointer and keyboard focus on the same display.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[mode.main.binding]
# Open a new Ghostty window.
alt-enter = '''exec-and-forget osascript -e '
tell application "Ghostty"
    new window
end tell'
'''

# Vim-style focus and movement directions.
alt-h = 'focus --boundaries-action wrap-around-the-workspace left'
alt-j = 'focus --boundaries-action wrap-around-the-workspace down'
alt-k = 'focus --boundaries-action wrap-around-the-workspace up'
alt-l = 'focus --boundaries-action wrap-around-the-workspace right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Consider `join-with` instead if normalizations are enabled later.
alt-slash = 'split horizontal'
alt-v = 'split vertical'

alt-f = 'fullscreen'
alt-s = 'layout v_accordion'
alt-w = 'layout h_accordion'
alt-e = 'layout tiles horizontal vertical'
alt-shift-space = 'layout floating tiling'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

# Flatten nested containers in the current workspace when the layout needs a reset.
alt-esc = 'flatten-workspace-tree'
alt-shift-c = 'reload-config'
alt-r = 'mode resize'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'
